<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      font-family: "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }

    h1 {
      color: #39ff14;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    a.project {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      width: 260px;
      height: 160px;
      border: 1px solid #39ff14;
      padding: 16px;
      text-decoration: none;
      color: #39ff14;
      transition: background 0.15s;
    }

    a.project:hover {
      background: #39ff1410;
    }

    a.project .title {
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    a.project .sub {
      font-size: 10px;
      letter-spacing: 0.06em;
      opacity: 0.45;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>portfolio</h1>
  <div class="grid">
    <a class="project" href="holy-boulders.html">
      <span class="title">holy boulders</span>
      <span class="sub">three.js terrain viewer / shawnee national forest</span>
    </a>
  </div>
</body>
</html>
